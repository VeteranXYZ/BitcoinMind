function Footer() {
  // ═══════════════════════════════════════════════════════════════════
// THE PULSE — Block-time visualization for BitcoinMind
// ───────────────────────────────────────────────────────────────────
// Paste this entire block INSIDE the existing <script type="text/babel">
// in index.html, AFTER the `function Footer()` definition and BEFORE
// `function ReadingProgress()`.
// ═══════════════════════════════════════════════════════════════════

// Genesis block: mined Jan 3, 2009 18:15:05 UTC
const GENESIS_TS = 1231006505000;

// Halving every 210,000 blocks
const HALVING_INTERVAL = 210000;

// Fallback values — used until the API responds.
// These are deliberately close-to-current so the page never looks stale
// even if mempool.space is unreachable. Update these on each deploy.
const FALLBACK_HEIGHT = 946537;

// Convert a number into spelled-out English (works up to ~999,999,999)
function spellNumber(n) {
  if (n === 0) return 'zero';
  const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine',
                'ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen',
                'seventeen', 'eighteen', 'nineteen'];
  const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];

  function under1000(num) {
    if (num < 20) return ones[num];
    if (num < 100) {
      const t = Math.floor(num / 10);
      const o = num % 10;
      return tens[t] + (o ? '-' + ones[o] : '');
    }
    const h = Math.floor(num / 100);
    const r = num % 100;
    return ones[h] + ' hundred' + (r ? ' ' + under1000(r) : '');
  }

  const millions = Math.floor(n / 1000000);
  const thousands = Math.floor((n % 1000000) / 1000);
  const rest = n % 1000;

  const parts = [];
  if (millions) parts.push(under1000(millions) + ' million');
  if (thousands) parts.push(under1000(thousands) + ' thousand');
  if (rest) parts.push(under1000(rest));
  return parts.join(' ');
}

// Compute years/months/days since genesis
function ageSinceGenesis(now = Date.now()) {
  const genesis = new Date(GENESIS_TS);
  const current = new Date(now);

  let years = current.getUTCFullYear() - genesis.getUTCFullYear();
  let months = current.getUTCMonth() - genesis.getUTCMonth();
  let days = current.getUTCDate() - genesis.getUTCDate();

  if (days < 0) {
    months -= 1;
    // Days in previous month
    const prevMonth = new Date(Date.UTC(current.getUTCFullYear(), current.getUTCMonth(), 0));
    days += prevMonth.getUTCDate();
  }
  if (months < 0) {
    years -= 1;
    months += 12;
  }
  return { years, months, days };
}

// Estimate the next halving date from current height
// (4 years ≈ 210,000 blocks, ~10 min/block)
function nextHalvingDate(currentHeight) {
  const nextHalvingHeight = Math.ceil((currentHeight + 1) / HALVING_INTERVAL) * HALVING_INTERVAL;
  const blocksRemaining = nextHalvingHeight - currentHeight;
  const msRemaining = blocksRemaining * 10 * 60 * 1000;
  const date = new Date(Date.now() + msRemaining);
  const month = date.toLocaleString('en-US', { month: 'short' });
  return { month, year: date.getFullYear() };
}

// Progress within current halving epoch (0..1)
function halvingProgress(currentHeight) {
  const epochStart = Math.floor(currentHeight / HALVING_INTERVAL) * HALVING_INTERVAL;
  return (currentHeight - epochStart) / HALVING_INTERVAL;
}

function Pulse() {
  const [height, setHeight] = useState(() => {
    try {
      const cached = localStorage.getItem('pulse_height');
      const parsed = cached ? parseInt(cached, 10) : NaN;
      return Number.isFinite(parsed) && parsed >= FALLBACK_HEIGHT ? parsed : FALLBACK_HEIGHT;
    } catch (e) {
      return FALLBACK_HEIGHT;
    }
  });
  const [pulsed, setPulsed] = useState(false);
  const [now, setNow] = useState(Date.now());
  const [visible, setVisible] = useState(true);

  // Poll for new block height
  useEffect(() => {
    let cancelled = false;
    let consecutiveFailures = 0;

    async function poll() {
      try {
        const res = await fetch('https://mempool.space/api/blocks/tip/height');
        if (!res.ok) throw new Error('not ok');
        const text = await res.text();
        const newHeight = parseInt(text, 10);
        if (cancelled) return;
        if (Number.isFinite(newHeight) && newHeight > 0) {
          consecutiveFailures = 0;
          setHeight(prev => {
            if (newHeight > prev) {
              try { localStorage.setItem('pulse_height', String(newHeight)); } catch (e) {}
              setPulsed(true);
              setTimeout(() => { if (!cancelled) setPulsed(false); }, 700);
              return newHeight;
            }
            return prev;
          });
        }
      } catch (e) {
        consecutiveFailures += 1;
        // After 5 consecutive failures (~2.5 min), hide silently
        if (consecutiveFailures >= 5 && !cancelled) {
          setVisible(false);
        }
      }
    }

    poll();
    const interval = setInterval(poll, 30000);
    return () => { cancelled = true; clearInterval(interval); };
  }, []);

  // Tick every minute to keep "days since genesis" fresh after midnight UTC
  useEffect(() => {
    const tick = setInterval(() => setNow(Date.now()), 60000);
    return () => clearInterval(tick);
  }, []);

  if (!visible) return null;

  const heightInWords = spellNumber(height);
  const { years, months, days } = ageSinceGenesis(now);
  const halving = nextHalvingDate(height);
  const progress = halvingProgress(height);

  const yearsWord = `${spellNumber(years)} year${years === 1 ? '' : 's'}`;
  const monthsWord = `${spellNumber(months)} month${months === 1 ? '' : 's'}`;
  const daysWord = `${spellNumber(days)} day${days === 1 ? '' : 's'}`;

  return (
    <section className="pulse" aria-label="Bitcoin network status">
      <div className="pulse-hd">
        <span className="pulse-lbl">The Pulse</span>
        <span className={`pulse-live ${pulsed ? 'pulse-live--flash' : ''}`} aria-hidden="true">
          <span className="pulse-live-dot" /> live
        </span>
      </div>

      <p className="pulse-line" aria-live="polite">
        At block <em className={pulsed ? 'pulse-num pulse-num--flash' : 'pulse-num'}>{heightInWords}</em>,
        Bitcoin is {yearsWord}, {monthsWord}, and {daysWord} old.
      </p>

      <div className="pulse-track">
        <div
          className={`pulse-mark ${pulsed ? 'pulse-mark--step' : ''}`}
          style={{ left: `${(progress * 100).toFixed(3)}%` }}
          aria-hidden="true"
        />
      </div>
      <div className="pulse-ends">
        <span>Genesis &middot; Jan 2009</span>
        <span>{halving.month} {halving.year} &middot; Halving</span>
      </div>
    </section>
  );
}

  return (
    <footer>
      <div className="ft-in">
        <span className="ft-copy">© 2026 BitcoinMind · Powered by Hiei</span>
        <span className="ft-upd">Last updated: April 2026</span>
      </div>
    </footer>
  );
}

function ReadingProgress() {
  useEffect(() => {
    const bar = document.getElementById('pb');
    const update = () => {
      const tot = document.documentElement.scrollHeight - window.innerHeight;
      bar.style.width = tot > 0 ? (window.scrollY / tot * 100) + '%' : '0%';
    };
    window.addEventListener('scroll', update, { passive: true });
    return () => window.removeEventListener('scroll', update);
  }, []);
  return null;
}

function NotesPage() {
  return (
    <div className="page">
      <div className="c">
        <div className="ph">
          <div className="ph-eye">Notes</div>
          <h1 className="ph-title"><em>Notes</em></h1>
          <p className="ph-desc">Original writing. Not curated resources — my own thinking, published when it's ready.</p>
        </div>

        <div className="note-wrap">
          <div className="note-hd">
            <div className="note-num">Note No. 1 · April 2011, republished 2024</div>
            <h2 className="note-title">What I wrote about Bitcoin<br />in April 2011, when it was $1</h2>
            <div className="note-subtitle">Originally published April 2011 · Translated from Chinese · Nothing has been changed</div>
          </div>

          <div className="note-body">
            <p>I've discovered something I can't quite describe: Bitcoin. It feels devil-like — for anyone who comes into contact with it, this thing could be either a temptation or a plunge into the depths of hell. This new form of virtual currency appears similar to others on the surface, but after careful analysis, everyone walks away with a look of astonishment, acknowledging that it is something fundamentally different.</p>
            <p>A form of virtual currency outside government control, with no organizational backing (whether this is truly the case remains to be verified), issued by and for citizens of the internet — what concerns me is not some distant question about whether it can shake the existing monetary order. I'm approaching this as a realist, questioning its reliability. Can that so-called "complex algorithm" truly never be broken? Could the founders secretly mass-produce supply for their own profit? And can value produced without labor ever earn genuine exchange value from ordinary public life?</p>
            <p>Because it is unmeasurable, and because the temptation of limitless appreciation is so great, I classify it as something devil-like. But I cannot deny that it has already formed a trading ecosystem of real scale globally — providing new channels for underground transactions across countries, generating a visible class of platform traders who make a living flipping it. Everything visible feels real, and yet that very realness makes the suspicious mind trust it even less.</p>
            <p>At present, very few people in China know about this. It is mostly a foreign phenomenon, though a small number of people here have already started buying graphics cards in bulk, playing the role of gold miners. More people are still watching from the sidelines. Many are calling it empty, calling it doomed.</p>
            <p>From conversations with a Taobao seller, I learned that Bitcoin only became a global hot topic in the past month or two, doubling in price. Google Trends confirms it. Which makes you wonder — something that appeared so suddenly, could it not also disappear just as suddenly, in some equally unforeseeable way?</p>
            <p>But 200% returns are enough to make people risk their lives. And for those infected with ambitions that reach toward infinity, even more so. Some have charged in on the principle of early entry, early profit. Whether enough people will come after them to sustain it — I think that depends entirely on the next few single-digit price movements.</p>
            <p>I'm suddenly reminded of China's A-share market in 2007, and today's Chinese property market. Can foreign investors complete this kind of sky-high relay race? Or is this something that simply cannot be measured by any existing model?</p>
            <p>But I believe this much remains constant, as it always has: <em>All men rush toward profit; all men flee from loss.</em> Human nature does not change.</p>
            <p className="note-closing-line">For now, I will stay on the sidelines.</p>
          </div>

          <div className="note-sig-block">
            <div className="note-sig">— Haitian Zhang, April 2011</div>
          </div>

          <div className="note-kicker">
            <div className="note-kicker-lbl">Note, 2024</div>
            <p className="note-kicker-body">The price when I wrote this was approximately $1. I stayed on the sidelines longer than I should have. The questions I asked were the right ones. The conclusion I reached was not.</p>
          </div>
        </div>
      </div>
      <Footer />
    </div>
  );
}

// ═══ APP ══════════════════════════════════════════════════════════════

function App() {
  const PAGES = ['home', 'start', 'books', 'essays', 'tools', 'about', 'notes'];
  const [page, setPage] = useState(() => {
    const h = window.location.hash.replace('#', '');
    return PAGES.includes(h) ? h : 'home';
  });

  const navigate = useCallback((p) => {
    setPage(p);
    window.location.hash = p;
    window.scrollTo({ top: 0, behavior: 'instant' });
  }, []);

  useEffect(() => {
    const onHash = () => {
      const h = window.location.hash.replace('#', '');
      if (PAGES.includes(h)) setPage(h);
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  const navItems = [
    { id: 'home',   label: 'Home' },
    { id: 'start',  label: 'Start Here' },
    { id: 'books',  label: 'Books' },
    { id: 'essays', label: 'Essays' },
    { id: 'tools',  label: 'Tools' },
    { id: 'about',  label: 'About' },
    { id: 'notes',  label: 'Notes' },
  ];

  return (
    <>
      <ReadingProgress />
      <nav>
        <div className="nav-in">
          <span className="nav-logo" onClick={() => navigate('home')}>Bitcoin<b>Mind</b></span>
          <div className="nav-links">
            {navItems.map(n => (
              <span key={n.id} className={`nl ${page === n.id ? 'on' : ''}`} onClick={() => navigate(n.id)}>
                {n.label}
              </span>
            ))}
          </div>
        </div>
      </nav>

      {page === 'home'   && <HomePage   setPage={navigate} />}
      {page === 'start'  && <StartHerePage setPage={navigate} />}
      {page === 'books'  && <BooksPage  />}
      {page === 'essays' && <EssaysPage />}
      {page === 'tools'  && <ToolsPage  />}
      {page === 'about'  && <AboutPage  setPage={navigate} />}
      {page === 'notes'  && <NotesPage  />}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
